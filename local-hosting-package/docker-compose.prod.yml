services:
  # Backend API
  # Note: Using remote MongoDB, so no local MongoDB container needed
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pune-dashboard-backend-prod
    restart: always
    ports:
      - "8002:8002"
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:b5a7adcac8107c867aa1@31.97.207.166:27017/?tls=false}
      DB_NAME: ${DB_NAME:-maharashtra_edu}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-strong-secret-key}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://school_dashboard.demo.agrayianailabs.com}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./data/excel:/app/data/excel:ro
    networks:
      - dashboard-network-prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-https://school_dashboard.demo.agrayianailabs.com/api}
    container_name: pune-dashboard-frontend-prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - dashboard-network-prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  dashboard-network-prod:
    driver: bridge
